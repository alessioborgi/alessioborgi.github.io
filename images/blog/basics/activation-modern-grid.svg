<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Modern activation functions</title>
  <desc id="desc">A grid of modern activation functions with smooth or approximate shapes.</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .panel { fill: #ffffff; stroke: #d7e3f4; stroke-width: 2; }
      .label { font: 700 22px "Arial", sans-serif; fill: #0f2a36; }
      .sub { font: 15px "Arial", sans-serif; fill: #5b6473; }
      .axis { stroke: #b8c6d9; stroke-width: 2; }
      .a { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .b { fill: none; stroke: #10b981; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .c { fill: none; stroke: #f97316; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .d { fill: none; stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" rx="28"/>
  <g transform="translate(20,20)">
    <g transform="translate(0,0)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">ELU</text><text class="sub" x="22" y="55">smooth negative saturation</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="a" d="M62 132 C90 134, 114 132, 136 124 L206 88"/></g>
    <g transform="translate(290,0)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">SELU</text><text class="sub" x="22" y="55">self-normalizing ELU</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="b" d="M58 134 C88 136, 112 132, 136 124 L210 84"/></g>
    <g transform="translate(580,0)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">CELU</text><text class="sub" x="22" y="55">continuously differentiable</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="c" d="M64 132 C102 132, 122 129, 136 124 C147 117, 160 105, 206 89"/></g>
    <g transform="translate(870,0)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">GELU</text><text class="sub" x="22" y="55">soft probabilistic gate</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="d" d="M66 130 C102 130, 118 126, 132 118 C142 110, 150 99, 206 88"/></g>

    <g transform="translate(0,185)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Swish</text><text class="sub" x="22" y="55">x · sigmoid(x)</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="a" d="M72 129 C104 136, 120 130, 132 120 C144 108, 154 99, 206 88"/></g>
    <g transform="translate(290,185)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">SiLU</text><text class="sub" x="22" y="55">same family as Swish</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="b" d="M72 129 C104 136, 120 130, 132 120 C144 108, 154 99, 206 88"/></g>
    <g transform="translate(580,185)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Mish</text><text class="sub" x="22" y="55">smooth non-monotonic</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="c" d="M70 128 C92 138, 116 136, 132 123 C145 108, 154 99, 206 88"/></g>
    <g transform="translate(870,185)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Hard Sigmoid</text><text class="sub" x="22" y="55">piecewise approximation</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="d" d="M62 122 L105 122 L170 62 L210 62"/></g>

    <g transform="translate(0,370)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Hard Tanh</text><text class="sub" x="22" y="55">clips to [-1, 1]</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="a" d="M62 136 L98 136 L170 62 L210 62"/></g>
    <g transform="translate(290,370)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Hard Swish</text><text class="sub" x="22" y="55">efficient gated ramp</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="b" d="M68 126 C104 128, 128 123, 150 108 C164 98, 178 92, 206 88"/></g>
    <g transform="translate(580,370)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Bent Identity</text><text class="sub" x="22" y="55">almost linear, slightly bent</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="c" d="M68 134 C106 122, 128 117, 206 88"/></g>
    <g transform="translate(870,370)"><rect class="panel" width="270" height="165" rx="18"/><text class="label" x="22" y="32">Arctan</text><text class="sub" x="22" y="55">smooth bounded squash</text><line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/><path class="d" d="M64 132 C98 126, 118 114, 136 99 C152 83, 172 72, 208 66"/></g>
  </g>
</svg>
