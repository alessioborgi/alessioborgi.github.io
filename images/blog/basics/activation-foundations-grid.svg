<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Classical activation functions</title>
  <desc id="desc">A grid of classical activation functions with small schematic plots.</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .panel { fill: #ffffff; stroke: #d7e3f4; stroke-width: 2; }
      .label { font: 700 22px "Arial", sans-serif; fill: #0f2a36; }
      .sub { font: 15px "Arial", sans-serif; fill: #5b6473; }
      .axis { stroke: #b8c6d9; stroke-width: 2; }
      .curve { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .curve2 { fill: none; stroke: #10b981; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .curve3 { fill: none; stroke: #f97316; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .curve4 { fill: none; stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .curve5 { fill: none; stroke: #dc2626; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 8; }
      .tiny { font: 13px "Arial", sans-serif; fill: #6b7280; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760" rx="28"/>

  <g transform="translate(20,20)">
    <!-- row 1 -->
    <g transform="translate(0,0)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Linear</text>
      <text class="sub" x="22" y="55">returns x unchanged</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve" d="M70 136 L200 88"/>
    </g>
    <g transform="translate(290,0)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Step</text>
      <text class="sub" x="22" y="55">hard threshold</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve3" d="M64 124 L134 124 L134 88 L208 88"/>
    </g>
    <g transform="translate(580,0)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Sigmoid</text>
      <text class="sub" x="22" y="55">squashes to [0, 1]</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve2" d="M58 122 C82 122, 95 120, 112 110 C126 102, 132 95, 136 84 C142 70, 159 58, 214 58"/>
    </g>
    <g transform="translate(870,0)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Tanh</text>
      <text class="sub" x="22" y="55">zero-centered squash</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve4" d="M58 132 C84 132, 102 123, 120 108 C129 100, 133 93, 136 84 C141 67, 156 58, 214 58"/>
    </g>

    <!-- row 2 -->
    <g transform="translate(0,185)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">ReLU</text>
      <text class="sub" x="22" y="55">drops negatives</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve3" d="M58 124 L136 124 L205 88"/>
    </g>
    <g transform="translate(290,185)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Leaky ReLU</text>
      <text class="sub" x="22" y="55">small negative slope</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve" d="M66 132 L136 124 L205 88"/>
    </g>
    <g transform="translate(580,185)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">PReLU</text>
      <text class="sub" x="22" y="55">learns the slope α</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve2" d="M76 137 L136 124 L205 88"/>
      <text class="tiny" x="70" y="146">α is learned</text>
    </g>
    <g transform="translate(870,185)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">RReLU</text>
      <text class="sub" x="22" y="55">random α in training</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve5" d="M82 139 L136 124 L205 88"/>
      <text class="tiny" x="62" y="146">α sampled each step</text>
    </g>

    <!-- row 3 -->
    <g transform="translate(0,370)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Softplus</text>
      <text class="sub" x="22" y="55">smooth ReLU</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve4" d="M62 121 C92 121, 112 120, 130 112 C144 106, 156 98, 206 89"/>
    </g>
    <g transform="translate(290,370)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Softsign</text>
      <text class="sub" x="22" y="55">gentler saturation</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve2" d="M64 132 C96 127, 116 115, 136 100 C153 88, 176 74, 210 66"/>
    </g>
    <g transform="translate(580,370)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">ReLU6</text>
      <text class="sub" x="22" y="55">ReLU clipped at 6</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve3" d="M62 124 L136 124 L178 88 L210 88"/>
    </g>
    <g transform="translate(870,370)">
      <rect class="panel" width="270" height="165" rx="18"/>
      <text class="label" x="22" y="32">Thresholded ReLU</text>
      <text class="sub" x="22" y="55">waits before turning on</text>
      <line class="axis" x1="38" y1="124" x2="235" y2="124"/><line class="axis" x1="136" y1="145" x2="136" y2="76"/>
      <path class="curve" d="M58 124 L160 124 L205 92"/>
      <text class="tiny" x="160" y="116">θ</text>
    </g>
  </g>
</svg>
